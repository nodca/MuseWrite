<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novel Platform</title>
    <script>
      // Anti-FOUC: apply saved theme before first paint
      (function () {
        try {
          var t = localStorage.getItem("novel-platform:theme");
          if (t === "warm" || t === "dark" || t === "modern") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
