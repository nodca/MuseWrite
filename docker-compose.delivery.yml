services:
  api:
    image: novel-platform-api:delivery
    build:
      context: .
      dockerfile: apps/api/Dockerfile.delivery
    container_name: novel_api_delivery
    environment: &api_worker_common_env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-novel_platform}
      CONFIG_PROFILE: ${CONFIG_PROFILE:-local-dev}

      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_TOKENS: ${AUTH_TOKENS:-local-user:local-dev-token}
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      AUTH_USER: ${AUTH_USER:-local-user}
      AUTH_PROJECT_OWNERS: ${AUTH_PROJECT_OWNERS:-}
      AUTH_DISABLED_USER: ${AUTH_DISABLED_USER:-local-user}

      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}

      LIGHTRAG_ENABLED: ${LIGHTRAG_ENABLED:-false}
      LIGHTRAG_BASE_URL: ${LIGHTRAG_BASE_URL:-http://lightrag:9621}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}

      NEO4J_ENABLED: ${NEO4J_ENABLED:-true}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_GDS_REQUIRED: ${NEO4J_GDS_REQUIRED:-true}

      RAG_ROUTE_POLICY: ${RAG_ROUTE_POLICY:-mix}
      QUALITY_GATE_ENFORCE: ${QUALITY_GATE_ENFORCE:-false}
      CITATION_POLICY: ${CITATION_POLICY:-off}
      CITATION_MIN_COUNT: ${CITATION_MIN_COUNT:-1}
      CONTEXT_WINDOW_PROFILE: ${CONTEXT_WINDOW_PROFILE:-balanced}
      CONTEXT_COMPRESSION_MODE: ${CONTEXT_COMPRESSION_MODE:-rerank}
      CONTEXT_COMPRESSION_RERANKER_ENABLED: ${CONTEXT_COMPRESSION_RERANKER_ENABLED:-true}
      CONTEXT_COMPRESSION_RERANKER_MODEL: ${CONTEXT_COMPRESSION_RERANKER_MODEL:-BAAI/bge-reranker-v2-minicpm-layerwise}
      CONTEXT_COMPRESSION_RERANKER_RUNTIME: ${CONTEXT_COMPRESSION_RERANKER_RUNTIME:-onnx}
      CONTEXT_COMPRESSION_RERANKER_TRUST_REMOTE_CODE: ${CONTEXT_COMPRESSION_RERANKER_TRUST_REMOTE_CODE:-true}
      CONTEXT_COMPRESSION_RERANKER_ONNX_PATH: ${CONTEXT_COMPRESSION_RERANKER_ONNX_PATH:-/app/models/bge-reranker-v2-minicpm-layerwise-int8-onnx/model.onnx}
      CONTEXT_COMPRESSION_RERANKER_ONNX_PROVIDER: ${CONTEXT_COMPRESSION_RERANKER_ONNX_PROVIDER:-CPUExecutionProvider}

      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}

      RAGAS_GATE_ENABLED: ${RAGAS_GATE_ENABLED:-false}
      RAGAS_THRESHOLD: ${RAGAS_THRESHOLD:-0.55}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: novel-platform-api:delivery
    build:
      context: .
      dockerfile: apps/api/Dockerfile.delivery
    container_name: novel_worker_delivery
    command: ["python", "-m", "app.worker"]
    environment:
      <<: *api_worker_common_env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: novel_postgres_delivery
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novel_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-novel_platform}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  neo4j:
    build:
      context: ./docker/neo4j-gds
      dockerfile: Dockerfile
      args:
        NEO4J_VERSION: ${NEO4J_IMAGE_TAG:-5.26.21-community}
        GDS_VERSION: ${NEO4J_GDS_VERSION:-2.13.7}
    container_name: novel_neo4j_delivery
    image: novel-platform-neo4j-gds:latest
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_dbms_security_procedures_unrestricted: gds.*
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-neo4jpassword} \"RETURN gds.version() AS version\" >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
    restart: unless-stopped

volumes:
  pg_data:
  neo4j_data:
  neo4j_logs:
